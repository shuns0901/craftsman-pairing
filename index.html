<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRAFTSMAN Pairing Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--amber:#C8861A;--amber-light:#FDF3E0;--amber-dark:#7A4F0A;--bg:#FAF8F4;--surface:#FFFFFF;--dark:#1A1510;--mid:#5C4F3A;--muted:#9C8E7A;--border:rgba(90,70,40,0.1);--border-hover:rgba(200,134,26,0.3);--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
header{background:var(--dark);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;flex-direction:column}
.logo-sub{font-size:9px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;font-weight:500}
.logo-main{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:.02em}
.logo-main em{font-style:italic;color:var(--amber)}
.logo-num{font-size:32px;color:var(--amber);font-family:'DM Serif Display',serif;line-height:1}
.mode-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:8px;position:sticky;top:54px;z-index:90}
.mode-btn{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.mode-btn.active{background:var(--dark);border-color:var(--dark);color:#fff}
.filters{padding:12px 20px;display:flex;gap:6px;overflow-x:auto;background:var(--bg);scrollbar-width:none;border-bottom:1px solid var(--border)}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 12px;border:1px solid var(--border);border-radius:16px;font-size:12px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--mid);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--amber);color:var(--amber)}
.filter-btn.active{background:var(--amber);border-color:var(--amber);color:#fff}
main{padding:16px 20px;max-width:960px;margin:0 auto}
.section-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--amber);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.season-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:var(--amber);color:#fff;font-family:'DM Sans',sans-serif}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .18s}
.card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 6px 18px rgba(200,134,26,.1)}
.card.season{border-color:rgba(200,134,26,.3);background:linear-gradient(135deg,#fff 80%,#FDF3E0)}
.card.featured{border-color:rgba(200,134,26,.25)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px}
.card-num{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}
.badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500}
.b-local{background:#E8F4E8;color:#2D6A2D}
.b-rare{background:#1A1510;color:var(--amber)}
.b-special{background:var(--amber-light);color:var(--amber-dark)}
.b-season{background:var(--amber);color:#fff}
.b-pick{background:#1A1510;color:#fff}
.card-name{font-size:13px;font-weight:500;color:var(--dark);line-height:1.4;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-tag{font-size:11px;color:var(--mid);background:var(--bg);border-radius:6px;padding:2px 7px}
.card-abv{font-size:11px;color:var(--muted);margin-left:auto}
.tap-hint{font-size:11px;color:var(--amber);text-align:right;margin-top:8px;opacity:0;transition:opacity .15s}
.card:hover .tap-hint{opacity:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(10,8,5,.6);z-index:200;animation:fadeIn .18s}
.overlay.active{display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay.active{align-items:center}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:22px 20px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;animation:slideUp .2s ease-out}
@media(min-width:600px){.modal{border-radius:var(--radius);max-height:82vh}}
@keyframes slideUp{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.modal-name{font-family:'DM Serif Display',serif;font-size:19px;color:var(--dark);line-height:1.3}
.modal-sub{font-size:12px;color:var(--muted);margin-top:2px}
.close-btn{background:var(--bg);border:none;width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px}
.modal-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.meta-chip{font-size:11px;padding:3px 9px;border-radius:8px;background:var(--bg);color:var(--mid)}
.ai-loading{display:flex;align-items:center;gap:8px;padding:16px 0;color:var(--muted);font-size:13px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.18s}
.dot:nth-child(3){animation-delay:.36s}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.ai-block{margin-bottom:14px}
.ai-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ai-text{font-size:13px;color:var(--dark);line-height:1.7}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.tag-row{display:flex;flex-wrap:wrap;gap:6px}
.tag-amber{font-size:12px;padding:4px 10px;border-radius:10px;background:var(--amber-light);color:var(--amber-dark)}
.pair-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;background:var(--surface)}
.pair-card.best{border-color:rgba(200,134,26,.5);background:var(--amber-light)}
.pair-best-label{font-size:10px;color:var(--amber);font-weight:500;letter-spacing:.06em;margin-bottom:6px}
.pair-name{font-size:14px;font-weight:500;color:var(--dark);margin-bottom:3px}
.pair-style{font-size:11px;color:var(--muted);margin-bottom:8px}
.pair-desc{font-size:12px;color:var(--mid);line-height:1.65;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.pair-reason-label{font-size:10px;color:var(--amber);font-weight:500;letter-spacing:.05em;margin-bottom:4px}
.pair-reason{font-size:12px;color:var(--dark);line-height:1.65}
.fl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.fl-row{display:flex;align-items:center;gap:6px}
.fl-label{font-size:11px;color:var(--mid);width:36px;flex-shrink:0}
.fl-track{flex:1;height:4px;background:#EEE8E0;border-radius:3px;overflow:hidden}
.fl-fill{height:100%;background:var(--amber);border-radius:3px}
.fl-val{font-size:10px;color:var(--muted);width:16px;text-align:right}
footer{text-align:center;padding:28px 20px;color:var(--muted);font-size:11px;letter-spacing:.04em}
</style>
</head>

【優先度の高い料理（必ず1品以上ペアリングに含めること）】
最優先: 季節メニュー — 春キャベツのポテトサラダ、砂肝コンフィと蕗のとう、ホタルイカとウドのマリネ、本日の鮮魚のカルパッチョ、山形キウイのグリーンサラダ、東北野菜のグリル、山菜といわいどりのペペロンチーノ、青森ベビーホタテのクリームパスタ、春野菜と桜エビの空豆クリームソースピッツァ

優先: 窯焼きピッツァ各種（マルゲリータ、ビスマルク、プロシュート、マリナーラ、クアトロフォルマッジ、アボカドと海老、仙台牛とトリュフ、トリュフ、モルタデラハム温泉卵、旬のピッツァ）`;

const GEMINI_KEY='AQ.Ab8RN6I8jkpJuw5ZKi23csEroYKwZmPS6afC5-iwGJ_HfJ5O-g';

async function callGemini(systemPrompt, userMessage){
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      systemInstruction:{parts:[{text:systemPrompt}]},
      contents:[{parts:[{text:userMessage}]}],
      generationConfig:{responseMimeType:'application/json'}
    })
  });
  const data=await res.json();
  return JSON.parse(data.candidates[0].content.parts[0].text);
}

let currentMode="beer",currentBeerCat="all",currentFoodCat="all";

function setMode(m){currentMode=m;document.getElementById('btn-beer').classList.toggle('active',m==='beer');document.getElementById('btn-food').classList.toggle('active',m==='food');render();}
function setBeerCat(c){currentBeerCat=c;renderBeerMode();}
function setFoodCat(c){currentFoodCat=c;renderFoodMode();}
function render(){currentMode==='beer'?renderBeerMode():renderFoodMode();}

function renderBeerMode(){
  document.getElementById('filter-bar').innerHTML=`<div class="filters"><button class="filter-btn ${currentBeerCat==='all'?'active':''}" onclick="setBeerCat('all')">すべて</button>${beerCatOrder.map(c=>`<button class="filter-btn ${currentBeerCat===c?'active':''}" onclick="setBeerCat('${c}')">${beerCatLabels[c]}</button>`).join('')}</div>`;
  const mc=document.getElementById('main-content');mc.innerHTML='';
  const cats=currentBeerCat==='all'?beerCatOrder:[currentBeerCat];
  cats.forEach(cat=>{
    const items=beers.filter(b=>b.cat.includes(cat)&&(cat!=='local'||b.cat.includes('local')));
    if(!items.length)return;
    if(currentBeerCat==='all'){const t=document.createElement('div');t.className='section-title';t.textContent=beerCatLabels[cat];mc.appendChild(t);}
    const g=document.createElement('div');g.className='grid';if(currentBeerCat!=='all')g.style.marginTop='16px';
    items.forEach(b=>g.appendChild(makeBeerCard(b)));mc.appendChild(g);
  });
}

function renderFoodMode(){
  const cats=Object.keys(foods);
  document.getElementById('filter-bar').innerHTML=`<div class="filters"><button class="filter-btn ${currentFoodCat==='all'?'active':''}" onclick="setFoodCat('all')">すべて</button>${cats.map(c=>`<button class="filter-btn ${currentFoodCat===c?'active':''}" onclick="setFoodCat('${c}')">${foods[c].label}</button>`).join('')}</div>`;
  const mc=document.getElementById('main-content');mc.innerHTML='';
  const show=currentFoodCat==='all'?cats:[currentFoodCat];
  show.forEach(cat=>{
    const sec=foods[cat];
    const t=document.createElement('div');t.className='section-title';
    t.innerHTML=sec.label+(cat==='season'?` <span class="season-badge">季節限定</span>`:'');
    mc.appendChild(t);
    const g=document.createElement('div');g.className='grid';
    sec.items.forEach(f=>g.appendChild(makeFoodCard(f)));mc.appendChild(g);
  });
}

function makeBeerCard(b){
  const isLocal=b.cat.includes('local');

  d.onclick=()=>openBeerModal(b);return d;
}

function makeFoodCard(f){
  const isSeason=f.cat==='season'||f.season;
  const d=document.createElement('div');
  d.className='card'+(isSeason?' season':f.featured?' featured':'');
  d.innerHTML=`<div class="card-top"><div></div><div class="badges">${isSeason?'<span class="badge b-season">季節</span>':''}${f.featured&&!isSeason?'<span class="badge b-pick">おすすめ</span>':''}</div></div><div class="card-name">${f.name}</div><div class="card-sub">${f.desc}</div><div class="tap-hint">タップしてビールを探す →</div>`;
  d.onclick=()=>openFoodModal(f);return d;
}
